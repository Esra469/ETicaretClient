<mat-form-field  class="product-create">  
  <mat-label>Name</mat-label>
  <input matInput #txtName >
</mat-form-field >

<mat-form-field class="product-create">
  <mat-label>Stock</mat-label>
  <input matInput type="number" min="0" value="0" #txtStock>
</mat-form-field  >

<mat-form-field class="product-create">
  <mat-label>Price</mat-label>
  <input matInput type="number" min="0" value="0" #txtPrice>
</mat-form-field >

<button matButton="elevated" class="btn" (click)="create(txtName, txtStock, txtPrice)">Create Product</button>

<hr/>

<!-- Options file.ts den geldi -->
<app-file-upload [options]="FileUploadOptions"></app-file-upload>
